# Rivery ingestion - HubSpot marketing data
type: data_platform.components.rivery_component.RiveryComponent

attributes:
  demo_mode: true
  api_token: "demo_token"
  account_id: "demo_account"
  rivers:
    - name: "hubspot_campaigns"
      river_id: "rv_hubspot_001"
      destination_table: "marketing_campaigns"
      source_type: "hubspot"
    - name: "hubspot_email_events"
      river_id: "rv_hubspot_002"
      destination_table: "email_events"
      source_type: "hubspot"
    - name: "hubspot_deals"
      river_id: "rv_hubspot_003"
      destination_table: "deals"
      source_type: "hubspot"
---
# Fivetran ingestion - Salesforce CRM + Stripe payments
type: data_platform.components.custom_fivetran_component.CustomFivetranComponent

attributes:
  demo_mode: true
  api_key: "demo_api_key"
  api_secret: "demo_api_secret"
  connectors:
    - name: "salesforce"
      tables:
        - accounts
        - opportunities
        - contacts
    - name: "stripe"
      tables:
        - payments
        - invoices
        - subscriptions
