# MariaDB CDC via Debezium → Kafka → Snowflake
#
# Architecture:
#   MariaDB (binlog + GTID) → Debezium source connector → Kafka → Snowflake sink connector → Snowflake
#
# Materializing cdc/debezium_connector registers both connectors with Kafka Connect.
# Once running, Debezium continuously reads the binlog and streams changes to Snowflake.
# The sensor monitors connector health via the Kafka Connect REST API.
type: data_platform.components.mariadb_cdc_manager_component.MariadbCdcManagerComponent

attributes:
  demo_mode: true

  # Kafka Connect REST API
  kafka_connect_url: "http://kafka-connect.internal.example.com:8083"

  # MariaDB source (Debezium reads binlog from here)
  mariadb_host: "mariadb.internal.example.com"
  mariadb_port: 3306
  mariadb_user: "debezium"
  mariadb_password: "demo_password"
  database_server_name: "mariadb-ecommerce"

  # Snowflake destination (sink connector writes here)
  snowflake_account: "myorg-myaccount"
  snowflake_user: "CDC_LOADER"
  snowflake_private_key: ""
  snowflake_database: "RAW"
  snowflake_schema: "CDC_ECOMMERCE"

  minimum_interval_seconds: 60

  tracked_tables:
    - source_table: "ecommerce.orders"
      destination_table: "orders"
    - source_table: "ecommerce.order_items"
      destination_table: "order_items"
    - source_table: "ecommerce.customers"
      destination_table: "customers"
    - source_table: "ecommerce.inventory"
      destination_table: "inventory"
---
# CDC Asset Checks — validates Snowflake destination tables hourly
#
# 4 checks per table (16 total):
#   - row_count: table is not empty
#   - freshness: Kafka sink connector is running
#   - no_null_pks: no NULL primary keys in Snowflake
#   - schema_valid: CDC metadata columns (_CDC_TIMESTAMP, _CDC_OPERATION) exist
type: data_platform.components.mariadb_cdc_checks_component.MariadbCdcChecksComponent

attributes:
  demo_mode: true

  # Snowflake connection (reads destination tables for validation)
  snowflake_account: "myorg-myaccount"
  snowflake_user: "ANALYTICS_READER"
  snowflake_password: ""
  snowflake_warehouse: "COMPUTE_WH"
  snowflake_database: "RAW"
  snowflake_schema: "CDC_ECOMMERCE"

  # Kafka Connect (for freshness/lag checks)
  kafka_connect_url: "http://kafka-connect.internal.example.com:8083"
  sink_connector_name: "mariadb-ecommerce-snowflake-sink"

  max_lag_events: 1000
  min_row_count: 1

  tracked_tables:
    - source_table: "ecommerce.orders"
      destination_table: "orders"
    - source_table: "ecommerce.order_items"
      destination_table: "order_items"
    - source_table: "ecommerce.customers"
      destination_table: "customers"
    - source_table: "ecommerce.inventory"
      destination_table: "inventory"
